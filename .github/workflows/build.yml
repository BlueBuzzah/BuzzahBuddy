name: Build 🏗️
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "BuzzahBuddy/**"
      - ".github/workflows/build.yml"
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - name: Restore Workloads
        run: dotnet workload install maui-android
      # -p:TargetFrameworks pins restore/build to the android TFM; the iOS
      # workload packs don't exist on Linux, so a full multi-TFM restore fails
      - name: Build Android
        run: dotnet build BuzzahBuddy/BuzzahBuddy.csproj -f net9.0-android -c Debug -p:TargetFrameworks=net9.0-android

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - name: Restore Workloads
        run: dotnet workload install maui-ios
      - name: Build iOS
        run: dotnet build BuzzahBuddy/BuzzahBuddy.csproj -f net9.0-ios -c Debug -p:TargetFrameworks=net9.0-ios
